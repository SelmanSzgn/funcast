name: CI

# Déclencheurs : à chaque push et pull request sur main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ============================================================
  # Job 1 : Qualité du code (ruff + mypy)
  # ============================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff — vérification du linting
        run: ruff check src/ tests/

      - name: Ruff — vérification du formatage
        run: ruff format --check src/ tests/

      - name: Mypy — vérification des types
        run: mypy src/funcast/

  # ============================================================
  # Job 2 : Tests sur plusieurs versions de Python
  # ============================================================
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    # Matrice : exécute les tests sur 3 versions de Python
    strategy:
      fail-fast: false   # continue les autres versions si l'une échoue
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lancement des tests avec pytest
        run: pytest

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: .coverage
